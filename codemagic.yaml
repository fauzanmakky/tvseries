workflows:
  android-crashlytics:
    name: Android Crashlytics Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - firebase
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install FVM & gunakan Flutter 3.44.0
        script: |
          dart pub global activate fvm
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fvm install 3.44.0
          fvm use 3.44.0 --force
          echo "export PATH=\"\$PATH:$(fvm flutter sdk-path)/bin\"" >> $CM_ENV

      - name: Setup Firebase config
        script: echo $FIREBASE_ANDROID_CONFIG | base64 --decode > android/app/google-services.json

      - name: Get Flutter packages
        script: fvm flutter pub get

      - name: Build Android App Bundle
        script: fvm flutter build appbundle --release

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk